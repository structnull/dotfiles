add_newline = false
palette     = "mist"

format       = "$username$hostname$directory$git_branch$git_status$nodejs$python$rust$golang$bun $character"
right_format = "$cmd_duration$time"

[palettes.mist]
ash  = "#c5cdd9"
fog  = "#9ecbff"
sage = "#8ee6a2"
dust = "#f2c38f"
rose = "#ff9aa2"
iris = "#c6a0ff"
sand = "#e6db74"

# в”Ђв”Ђ Prompt character в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[character]
success_symbol = "[->](bold sage)"
error_symbol   = "[->](bold rose)"
vicmd_symbol   = "[vi](bold iris)"

# в”Ђв”Ђ User & host (SSH only) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[username]
show_always = false
style_user  = "iris"
format      = "[$user]($style)"

[hostname]
ssh_only = true
style    = "ash"
format   = "[@$hostname]($style) "

# в”Ђв”Ђ Directory в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[directory]
style             = "bold fog"
read_only         = " ro"
read_only_style   = "bold rose"
home_symbol       = "~"
truncation_length = 3
truncate_to_repo  = true
truncation_symbol = "../"
format            = "[$path]($style)[$read_only]($read_only_style)"

# в”Ђв”Ђ Git в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[git_branch]
symbol = ""
style  = "ash"
format = " [$branch]($style)"

[git_status]
style      = "bold sand"
format     = " ([$all_status$ahead_behind]($style))"
ahead      = "в†‘$count"
behind     = "в†“$count"
diverged   = "в†•$ahead_countв†“$behind_count"
modified   = "~$count"
staged     = "+$count"
untracked  = "?$count"
deleted    = "-$count"
conflicted = "!$count"

# в”Ђв”Ђ Languages в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[nodejs]
symbol = ""
style  = "sage"
format = "[node $version]($style) "

[python]
symbol        = ""
style         = "fog"
format        = "[py $version]($style) "
python_binary = ["python3", "python"]

[rust]
symbol = ""
style  = "dust"
format = "[rs $version]($style) "

[golang]
symbol = ""
style  = "fog"
format = "[go $version]($style) "

[bun]
symbol = ""
style  = "sage"
format = "[bun $version]($style) "

# в”Ђв”Ђ Right prompt в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
[cmd_duration]
min_time = 2000
style    = "dust"
format   = "[$duration]($style) "

[time]
disabled    = false
time_format = "%I:%M %p"
style       = "ash"
format      = "[$time]($style)"
